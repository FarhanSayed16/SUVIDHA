; ==============================================================================
; SUVIDHA — PgBouncer Configuration
; TRD Section 6.3 — Connection Pooling
; File: /etc/pgbouncer/pgbouncer.ini
; ==============================================================================

[databases]
; Each microservice gets its own database alias with a dedicated PostgreSQL role.
; Principle of least privilege: each service can only access its own tables.
; Replace PGBOUNCER_HOST and PGBOUNCER_PORT with actual PostgreSQL host/port.

suvidha_auth     = host=suvidha-postgres port=5432 dbname=suvidha_db user=auth_service_user
suvidha_payment  = host=suvidha-postgres port=5432 dbname=suvidha_db user=payment_service_user
suvidha_complaint = host=suvidha-postgres port=5432 dbname=suvidha_db user=complaint_service_user
suvidha_notification = host=suvidha-postgres port=5432 dbname=suvidha_db user=notification_service_user
suvidha_analytics = host=suvidha-postgres port=5432 dbname=suvidha_db user=analytics_service_user
suvidha_config   = host=suvidha-postgres port=5432 dbname=suvidha_db user=config_service_user
suvidha_request  = host=suvidha-postgres port=5432 dbname=suvidha_db user=request_service_user

; Default alias for development (uses main suvidha user — NOT for production)
; In production, remove this and configure per-service aliases only
suvidha_db       = host=suvidha-postgres port=5432 dbname=suvidha_db user=suvidha

[pgbouncer]
; ------------------------------------------------------------------------------
; NETWORK
; ------------------------------------------------------------------------------
; PgBouncer listens on this port — microservices connect here (NOT directly to PG)
listen_port = 6432
listen_addr = 0.0.0.0

; Administrative interface (local only for security)
admin_users = pgbouncer_admin
stats_users = pgbouncer_admin

; Allow any IP — services are on Docker internal network; external access blocked by firewall
; In production: restrict to Docker subnet e.g. 172.16.0.0/12
client_tls_sslmode = prefer
server_tls_sslmode = prefer

; ------------------------------------------------------------------------------
; POOLING MODE — TRD Section 6.3
; ------------------------------------------------------------------------------
; transaction: Pool connection is only held for duration of a transaction.
; Best for short-lived Prisma queries. Required for PgBouncer compatibility with Prisma.
; WARNING: session-level features (temp tables, advisory locks, SET LOCAL) are NOT supported.
pool_mode = transaction

; ------------------------------------------------------------------------------
; CONNECTION LIMITS — TRD Section 6.3
; ------------------------------------------------------------------------------
; Max connections from all services combined
max_client_conn = 500

; Per-database default pool size (connections PgBouncer holds to PostgreSQL)
; 20 per service × 7 services = 140 max PostgreSQL connections used
default_pool_size = 20

; Minimum connections kept alive (warm pool)
min_pool_size = 5

; Reserve pool for bursts (used when default pool is exhausted)
reserve_pool_size = 5

; Time (seconds) to wait before activating reserve pool
reserve_pool_timeout = 5.0

; ------------------------------------------------------------------------------
; TIMEOUTS
; ------------------------------------------------------------------------------
; How long (seconds) a server connection can be idle before being closed
server_idle_timeout = 600

; How long (seconds) a client can wait for a server connection
client_login_timeout = 60

; How long (seconds) a connection can stay in query/transaction before being killed
query_timeout = 30
query_wait_timeout = 120

; Connection attempt timeout to PostgreSQL
server_connect_timeout = 15

; Server lifetime: close server connections older than this (seconds) to force rotation
; Helps with PostgreSQL memory leaks on long-running connections
server_lifetime = 3600

; ------------------------------------------------------------------------------
; AUTHENTICATION
; ------------------------------------------------------------------------------
; auth_type = scram-sha-256 is preferred for production
; For development with Docker: md5 is acceptable
auth_type = scram-sha-256

; File containing service user passwords in userlist format
; Each line: "username" "password"
; Generate with: pg_md5 or store scram hashes
auth_file = /etc/pgbouncer/userlist.txt

; ------------------------------------------------------------------------------
; LOGGING
; ------------------------------------------------------------------------------
; Log level: 0 = no log, 1 = connect/disconnect, 2 = pooler errors, 3 = verbose
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Syslog (set to 1 for production to send logs to system log)
syslog = 0
log_stats = 1
stats_period = 60

; ------------------------------------------------------------------------------
; NOTES FOR OPERATIONS TEAM
; ------------------------------------------------------------------------------
; 1. Prisma requires pool_mode = transaction (Prisma does not support session mode)
;    See: https://www.prisma.io/docs/guides/performance-and-optimization/connection-management
;
; 2. Prepared statements are DISABLED by default in Prisma's PgBouncer mode.
;    In DATABASE_URL add: ?pgbouncer=true&connection_limit=1
;    Example: postgresql://auth_service_user:pass@pgbouncer:6432/suvidha_auth?pgbouncer=true
;
; 3. To reload config without restart:
;    psql -U pgbouncer_admin -h 127.0.0.1 -p 6432 pgbouncer -c "RELOAD;"
;
; 4. To view pool stats:
;    psql -U pgbouncer_admin -h 127.0.0.1 -p 6432 pgbouncer -c "SHOW POOLS;"
;
; 5. Password rotation: update userlist.txt, then RELOAD — no downtime required.

; ==============================================================================
; userlist.txt format (store separately — never commit passwords to Git)
; ==============================================================================
; "auth_service_user" "SCRAM-SHA-256$<iterations>:<salt>$<storedkey>:<serverkey>"
; "payment_service_user" "SCRAM-SHA-256$..."
; "complaint_service_user" "SCRAM-SHA-256$..."
; "notification_service_user" "SCRAM-SHA-256$..."
; "analytics_service_user" "SCRAM-SHA-256$..."
; "config_service_user" "SCRAM-SHA-256$..."
; "request_service_user" "SCRAM-SHA-256$..."
; "pgbouncer_admin" "SCRAM-SHA-256$..."
